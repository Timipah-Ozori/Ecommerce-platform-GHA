name: Backend CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build -t ecommerce-api .


      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p ~/ecommerce-app/backend
            cd ~/ecommerce-app/backend

            git pull || git clone https://github.com/Timipah-Ozori/Ecommerce-platform-GHA.git .

            docker stop ecommerce-backend || true
            docker rm ecommerce-backend || true

            docker build -t ecommerce-backend .
            docker run -d -p 3000:3000 --name ecommerce-backend ecommerce-backend
